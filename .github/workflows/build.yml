name: Build App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pdfplumber openpyxl pytesseract pdf2image pyinstaller
      - name: Build exe
        run: pyinstaller --onefile --windowed --hidden-import=pytesseract --hidden-import=pdf2image warrant_extractor.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WarrantExtractor-Windows
          path: dist/warrant_extractor.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pdfplumber openpyxl pytesseract pdf2image pyinstaller
      - name: Build app
        run: pyinstaller --onefile --windowed --hidden-import=pytesseract --hidden-import=pdf2image warrant_extractor.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WarrantExtractor-Mac
          path: dist/warrant_extractor
